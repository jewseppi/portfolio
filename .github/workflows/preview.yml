name: PR Preview (GitHub Pages)

# Deploys the PR branch to GitHub Pages as a live preview by publishing
# the static export to the gh-pages branch (GitHub auto-enables Pages
# for that branch, so no repo-settings change is needed).
# Production deploys to GoDaddy from main (deploy.yml), so the Pages
# site is used exclusively for previews.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Pages base path
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
          commit_message: "Preview deploy: ${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const marker = '<!-- pages-preview-comment -->';
            const body = [
              marker,
              `### 🔍 Live preview deployed`,
              ``,
              `**${url}**`,
              ``,
              `_Built from \`${sha}\`. The preview updates on every push to this PR._`,
              ``,
              `_Note: the very first deployment can take a couple of minutes`,
              `to become available while GitHub provisions the Pages site._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
