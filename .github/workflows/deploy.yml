name: Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://jsilverman.ca

      # If your build outputs to "out/", archive that
      - name: Create archive and upload
        run: |
          cd out
          tar -czf ../site.tar.gz .
          cd ..
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa site.tar.gz ${{ secrets.USERNAME }}@${{ secrets.HOST }}:~/
        env:
          SSH_AUTH_SOCK: /dev/null
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to public_html (preserve xlsvc/**)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Temp staging dir for extracted site
            rm -rf ~/deploy_tmp && mkdir -p ~/deploy_tmp/site
            tar -xzf ~/site.tar.gz -C ~/deploy_tmp/site
            rm -f ~/site.tar.gz

            # Ensure public_html exists
            mkdir -p ~/public_html

            # Sync while EXCLUDING your app folders
            rsync -av --delete \
              --exclude 'api/**' \
              --exclude 'ui/**' \
              ~/deploy_tmp/site/ ~/public_html/

            # Permissions: don't touch api or ui folders
            ( cd ~/public_html
              # files (excluding api, ui)
              find . \( -path './api' -o -path './ui' \) -prune -o -type f -print0 | xargs -0 -r chmod 644
              # dirs (excluding api, ui) 
              find . \( -path './api' -o -path './ui' \) -prune -o -type d -print0 | xargs -0 -r chmod 755
            )

            # Cleanup temp
            rm -rf ~/deploy_tmp

            echo "Deployed to ~/public_html (xlsvc preserved)."

      - name: Create/refresh root .htaccess (Next.js static rewrite)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > ~/public_html/.htaccess << 'EOF'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
            EOF
            chmod 644 ~/public_html/.htaccess
            echo "Root .htaccess written."

      - name: Verify deployment
        run: |
          echo "Deployment complete ✅"
          echo "Check https://jsilverman.ca"
